  date_format: '%Y%m%d'
tiers:
  deep:
    label: 精读
    prefix: 🧠【精读】
    archive_file: 精读.md
    description: 低频、高思想密度或需要认真学习归档的来源。
  watch:
    label: 重点扫读
    prefix: 👀【重点】
    archive_file: 重点扫读.md
    description: 值得注意但不必逐条深读，适合每日集中扫读。
  research:
    label: 科研工具
    prefix: 🧪【科研】
    archive_file: 科研工具.md
    description: 与科研软件、数据处理、写作或知识管理直接相关。
  stream:
    label: 背景流
    prefix: 🌊【背景】
    archive_file: null
    description: 保持感知即可，不应占用深度注意力。
  noise:
    label: 低优先级
    prefix: 🕳️【低优先】
    archive_file: null
    description: 容易制造噪音，默认不即时打断。
