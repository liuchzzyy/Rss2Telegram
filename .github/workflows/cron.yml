name: Cron Action
on:
  workflow_dispatch:
  schedule:
    # Asia/Shanghai 06:00, 10:00, 14:00, 17:00, 20:00
    # UTC 22:00, 02:00, 06:00, 09:00, 12:00
    - cron: '0 22,2,6,9,12 * * *'

permissions:
  contents: write

concurrency:
  group: rss2telegram-history
  cancel-in-progress: false

jobs:
  rss2telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Download artifact
        id: download
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: cron.yml
          workflow_conclusion: success
      - name: Move database
        run: |
          if [ -f rss2telegram/rss2telegram.db ]; then
            mv rss2telegram/rss2telegram.db rss2telegram.db
          fi
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked
      - name: Create personal config
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DESTINATIONS: ${{ secrets.DESTINATIONS }}
          TOPIC: ${{ secrets.TOPIC }}
          MESSAGE_TEMPLATE: ${{ secrets.MESSAGE_TEMPLATE }}
          BUTTON_TEXT: ${{ secrets.BUTTON_TEXT }}
          HIDE_BUTTON: ${{ secrets.HIDE_BUTTON }}
          PARAMETERS: ${{ secrets.PARAMETERS }}
          TELEGRAPH_TOKEN: ${{ secrets.TELEGRAPH_TOKEN }}
          EMOJIS: ${{ secrets.EMOJIS }}
          OPML_FILE: ${{ secrets.OPML_FILE }}
          DATABASE: ${{ secrets.DATABASE }}
          MAX_ENTRIES_PER_FEED: ${{ secrets.MAX_ENTRIES_PER_FEED }}
          SEND_ON_FIRST_RUN: ${{ secrets.SEND_ON_FIRST_RUN }}
          FETCH_IMAGES: ${{ secrets.FETCH_IMAGES }}
          REQUEST_TIMEOUT: ${{ secrets.REQUEST_TIMEOUT }}
          SLEEP_BETWEEN_MESSAGES: ${{ secrets.SLEEP_BETWEEN_MESSAGES }}
        run: |
          python - <<'PY'
          import os

          keys = [
              "BOT_TOKEN",
              "DESTINATIONS",
              "TOPIC",
              "MESSAGE_TEMPLATE",
              "BUTTON_TEXT",
              "HIDE_BUTTON",
              "PARAMETERS",
              "TELEGRAPH_TOKEN",
              "EMOJIS",
              "OPML_FILE",
              "DATABASE",
              "MAX_ENTRIES_PER_FEED",
              "SEND_ON_FIRST_RUN",
              "FETCH_IMAGES",
              "REQUEST_TIMEOUT",
              "SLEEP_BETWEEN_MESSAGES",
          ]

          with open(".env", "w", encoding="utf-8") as handle:
              for key in keys:
                  handle.write(f"{key}={os.environ.get(key, '')}\n")
          PY
      - name: Run Rss to Telegram
        run: uv run rss2telegram
      - name: Commit history database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rss2telegram.db
          if git diff --cached --quiet; then
            echo "No database changes to commit"
          else
            git commit -m "Update RSS history database"
            git push origin HEAD:main
          fi
      - name: Upload history
        uses: actions/upload-artifact@v4
        with:
          name: rss2telegram
          path: rss2telegram.db
          if-no-files-found: error
